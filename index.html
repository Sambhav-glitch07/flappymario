<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Mario Bros</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        #game-container {
            position: relative;
            width: 480px;
            height: 640px;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 4px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #5c94fc; /* Classic Mario Sky Blue */
        }
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }
        h1 {
            font-size: 3rem;
            color: #ffcc00;
            text-shadow: 4px 4px 0px #b22222, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 2px 2px 0px #000;
            margin-bottom: 5px;
            text-align: center;
            letter-spacing: 2px;
            animation: bounce 0.6s infinite alternate;
        }
        .credits {
            font-size: 1rem;
            color: #fff;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0px #ff3333, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000, 2px 2px 3px #000;
            margin-bottom: 25px;
            font-family: 'Courier New', Courier, monospace;
        }
        .btn {
            background: linear-gradient(to bottom, #ff3333, #cc0000);
            border: 3px solid #fff;
            border-radius: 8px;
            color: white;
            padding: 12px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #660000;
            text-shadow: 2px 2px #000;
            margin: 10px;
            min-width: 180px;
            text-align: center;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #660000;
        }
        .score-board {
            background: rgba(252, 216, 168, 0.9);
            border: 4px solid #000;
            border-radius: 8px;
            padding: 20px;
            color: #000;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            min-width: 240px;
            margin-bottom: 15px;
            box-shadow: inset -4px -4px 0px #b57838;
        }
        .score-val {
            font-size: 2rem;
            color: #ff3333;
            text-shadow: 1px 1px 0 #000;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            pointer-events: none;
            z-index: 5;
        }
        .hud-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #pause-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border: 2px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            z-index: 15;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #pause-btn::before, #pause-btn::after {
            content: '';
            width: 5px;
            height: 20px;
            background: #fff;
            margin: 0 2px;
            display: inline-block;
        }
        .paused-state::before, .paused-state::after {
            display: none !important;
        }
        .paused-state::shadow {
            display: none;
        }
        #pause-btn.paused-state::before {
            content: '';
            display: block !important;
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 16px solid #fff;
            margin-left: 4px;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="hud-item" style="color: #fff;">SCORE: <span id="hud-score">0</span></div>
        <div class="hud-item" style="color: #ffd700;">COINS: <span id="hud-coins">0</span></div>
    </div>

    <button id="pause-btn" class="hidden"></button>

    <canvas id="gameCanvas" width="480" height="640"></canvas>

    <div id="start-menu" class="ui-screen">
        <h1>FLAPPY MARIO</h1>
        <div class="credits">GAME BY SAMBHAV</div>
        <div style="color: #fff; font-size: 1rem; margin-bottom: 25px; text-shadow: 1px 1px 2px #000; text-align: center; padding: 0 20px;">
            Tap, Spacebar, or Click to Jump.<br>Collect Coins & Avoid Pipes!
        </div>
        <button class="btn" id="start-btn">START GAME</button>
    </div>

    <div id="game-over-menu" class="ui-screen hidden">
        <h1>GAME OVER</h1>
        <div class="credits" style="margin-bottom: 15px;">GAME BY SAMBHAV</div>
        <div class="score-board">
            <div>SCORE</div>
            <div id="final-score" class="score-val">0</div>
            <div style="margin-top: 10px; border-top: 2px dashed #888; padding-top: 10px;">BEST SCORE</div>
            <div id="high-score" class="score-val" style="color: #228b22;">0</div>
        </div>
        <button class="btn" id="restart-btn">PLAY AGAIN</button>
    </div>
</div>

<script>
/**
 * AUDIO SYNTHESIZER (Web Audio API)
 * Eliminates reliance on external audio assets for robustness.
 */
class SoundEngine {
    constructor() {
        this.ctx = null;
    }
    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }
    playJump() {
        if (!this.ctx) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.15);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.15);
    }
    playCoin() {
        if (!this.ctx) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(987.77, this.ctx.currentTime); // B5
        osc.frequency.setValueAtTime(1318.51, this.ctx.currentTime + 0.08); // E6
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.35);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.35);
    }
    playScore() {
        if (!this.ctx) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.type = 'sine';
        // Classic high-pitched retro arcade pass notification tone
        osc.frequency.setValueAtTime(659.25, this.ctx.currentTime); // E5
        osc.frequency.setValueAtTime(880.00, this.ctx.currentTime + 0.06); // A5
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.2);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.2);
    }
    playHit() {
        if (!this.ctx) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(60, this.ctx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.4);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.4);
    }
}
const Sound = new SoundEngine();

/**
 * PROCEDURAL SPRITE GENERATOR
 * Dynamically draws retro assets onto offscreen canvases.
 */
function createMarioSprites() {
    const sprites = [];
    // 3 Frame running/flapping cycle
    for(let frame = 0; frame < 3; frame++) {
        const canvas = document.createElement('canvas');
        canvas.width = 36;
        canvas.height = 42;
        const ctx = canvas.getContext('2d');
        
        // Custom retro grid drawing for Mario
        ctx.fillStyle = '#ff3333'; // Red Cap/Shirt
        ctx.fillRect(9, 0, 18, 6);
        ctx.fillRect(6, 6, 27, 3);
        ctx.fillStyle = '#b57838'; // Brown Hair/Shoes
        ctx.fillRect(6, 9, 9, 6);
        ctx.fillRect(6, 36, 9, 6);
        ctx.fillRect(21, 36 + (frame % 2), 9, 5); // Simple running step animation
        ctx.fillStyle = '#ffcca3'; // Skin tone
        ctx.fillRect(15, 9, 18, 12);
        ctx.fillStyle = '#000'; // Eye
        ctx.fillRect(24, 9, 3, 6);
        ctx.fillStyle = '#0000b2'; // Blue Overalls
        ctx.fillRect(9, 21, 18, 15);
        ctx.fillStyle = '#ffcc00'; // Buttons
        ctx.fillRect(12, 24, 3, 3);
        ctx.fillRect(21, 24, 3, 3);
        
        sprites.push(canvas);
    }
    return sprites;
}

/**
 * PARALLAX BACKGROUND LAYERS
 */
class Background {
    constructor(canvasWidth, canvasHeight) {
        this.width = canvasWidth;
        this.height = canvasHeight;
        this.skyElements = [];
        this.bushElements = [];
        
        // Generate clouds
        for(let i = 0; i < 4; i++) {
            this.skyElements.push({
                x: Math.random() * this.width + i * 150,
                y: Math.random() * 120 + 30,
                speed: 0.3 + Math.random() * 0.2,
                size: 40 + Math.random() * 30
            });
        }
        // Generate Hills/Bushes
        for(let i = 0; i < 5; i++) {
            this.bushElements.push({
                x: i * 130,
                y: this.height - 130,
                w: 90 + Math.random() * 40,
                h: 50 + Math.random() * 30,
                speed: 1.0
            });
        }
    }

    update(speedModifier) {
        this.skyElements.forEach(cloud => {
            cloud.x -= cloud.speed * speedModifier;
            if (cloud.x + cloud.size * 2 < 0) cloud.x = this.width + Math.random() * 50;
        });
        this.bushElements.forEach(bush => {
            bush.x -= bush.speed * speedModifier;
            if (bush.x + bush.w < 0) bush.x = this.width;
        });
    }

    draw(ctx) {
        // Sky Gradient
        let grad = ctx.createLinearGradient(0, 0, 0, this.height);
        grad.addColorStop(0, '#5c94fc');
        grad.addColorStop(0.7, '#b8e8fc');
        grad.addColorStop(1, '#fce4a0');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, this.width, this.height);

        // Draw Clouds
        ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
        this.skyElements.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.size * 0.4, 0, Math.PI * 2);
            ctx.arc(c.x + c.size * 0.3, c.y - c.size * 0.2, c.size * 0.4, 0, Math.PI * 2);
            ctx.arc(c.x + c.size * 0.6, c.y, c.size * 0.4, 0, Math.PI * 2);
            ctx.fill();
        });

        // Draw Hills/Bushes (Parallax)
        this.bushElements.forEach(b => {
            ctx.fillStyle = '#73c718';
            ctx.beginPath();
            ctx.ellipse(b.x + b.w/2, b.y + b.h, b.w/2, b.h, 0, Math.PI, 0);
            ctx.fill();
            // Bush Outline detail
            ctx.strokeStyle = '#004000';
            ctx.lineWidth = 2;
            ctx.stroke();
        });
    }
}

/**
 * MARIO OBJECT
 */
class Mario {
    constructor() {
        this.x = 80;
        this.y = 250;
        this.width = 34;
        this.height = 40;
        this.velocity = 0;
        this.gravity = 0.4;
        this.jumpForce = -7.5;
        this.sprites = createMarioSprites();
        this.frame = 0;
        this.animTimer = 0;
        this.rotation = 0;
    }

    jump() {
        this.velocity = this.jumpForce;
        Sound.playJump();
    }

    update() {
        this.velocity += this.gravity;
        this.y += this.velocity;
        
        // Handle rotation based on velocity
        this.rotation = Math.min(Math.max(-0.3, this.velocity * 0.06), 0.7);

        // Track frame execution for running animation
        this.animTimer++;
        if (this.animTimer % 6 === 0) {
            this.frame = (this.frame + 1) % 3;
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
        ctx.rotate(this.rotation);
        
        // Render generated bitmap
        ctx.drawImage(this.sprites[this.frame], -this.width / 2, -this.height / 2, this.width, this.height);
        ctx.restore();
    }

    getHitbox() {
        // Tight bounds for fair pixel collision
        return {
            x: this.x + 4,
            y: this.y + 2,
            w: this.width - 8,
            h: this.height - 4
        };
    }
}

/**
 * OBSTACLE PIPE CLASS
 */
class Pipe {
    constructor(x, canvasHeight, gapSize, topHeight) {
        this.x = x;
        this.width = 76;
        this.topHeight = topHeight;
        this.gapSize = gapSize;
        this.canvasHeight = canvasHeight;
        this.bottomY = topHeight + gapSize;
        this.bottomHeight = canvasHeight - this.bottomY - 80; // 80px floor reservation
        this.passed = false;
        this.hasCoin = Math.random() < 0.6; // 60% chance pipe spawns a bonus coin
        this.coinY = this.topHeight + this.gapSize / 2;
        this.coinCollected = false;
        this.coinAnim = 0;
    }

    update(speed) {
        this.x -= speed;
        this.coinAnim += 0.1;
    }

    draw(ctx) {
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#000';

        // Draw Pipes (Green gradient texture)
        let grad = ctx.createLinearGradient(this.x, 0, this.x + this.width, 0);
        grad.addColorStop(0, '#00a800');
        grad.addColorStop(0.3, '#78f878');
        grad.addColorStop(0.7, '#00a800');
        grad.addColorStop(1, '#004000');
        ctx.fillStyle = grad;

        // 1. Top Pipe
        ctx.fillRect(this.x, 0, this.width, this.topHeight);
        ctx.strokeRect(this.x, -5, this.width, this.topHeight + 5);
        // Top Pipe Rim Lip
        ctx.fillRect(this.x - 4, this.topHeight - 24, this.width + 8, 24);
        ctx.strokeRect(this.x - 4, this.topHeight - 24, this.width + 8, 24);

        // 2. Bottom Pipe
        ctx.fillRect(this.x, this.bottomY, this.width, this.bottomHeight);
        ctx.strokeRect(this.x, this.bottomY, this.width, this.bottomHeight + 5);
        // Bottom Pipe Rim Lip
        ctx.fillRect(this.x - 4, this.bottomY, this.width + 8, 24);
        ctx.strokeRect(this.x - 4, this.bottomY, this.width + 8, 24);

        // 3. Draw Coin if present
        if (this.hasCoin && !this.coinCollected) {
            ctx.save();
            ctx.translate(this.x + this.width / 2, this.coinY);
            // Oscillating horizontal stretch to simulate 3D rotation
            ctx.scale(Math.abs(Math.sin(this.coinAnim)), 1);
            
            ctx.fillStyle = '#ffcc00';
            ctx.strokeStyle = '#cc7700';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Inner ridge detail
            ctx.beginPath();
            ctx.arc(0, 0, 7, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }
    }

    checkCollision(box) {
        // Pipe collision math
        if (box.x + box.w > this.x && box.x < this.x + this.width) {
            if (box.y < this.topHeight || box.y + box.h > this.bottomY) {
                return true;
            }
        }
        return false;
    }

    checkCoinPickup(box) {
        if (!this.hasCoin || this.coinCollected) return false;
        let coinX = this.x + this.width / 2;
        // Basic distance calculation between centers
        let distX = Math.abs(coinX - (box.x + box.w / 2));
        let distY = Math.abs(this.coinY - (box.y + box.h / 2));
        
        if (distX < 24 && distY < 28) {
            this.coinCollected = true;
            return true;
        }
        return false;
    }
}

/**
 * MASTER GAME MANAGEMENT SYSTEM
 */
class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        this.mario = null;
        this.background = null;
        this.pipes = [];
        
        this.score = 0;
        this.coins = 0;
        this.gameSpeed = 2.8;
        this.distanceTraveled = 0;
        this.pipeSpawnTimer = 0;
        
        this.isGameOver = false;
        this.isPaused = false;
        this.isPlaying = false;
        
        this.highScore = localStorage.getItem('flappy_mario_highscore') || 0;
        
        this.initDOM();
    }

    initDOM() {
        // Button actions
        document.getElementById('start-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            Sound.init();
            this.start();
        });
        document.getElementById('restart-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            this.start();
        });
        
        const pauseBtn = document.getElementById('pause-btn');
        pauseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            this.togglePause();
        });

        // Global Event Hooks for Controls
        const handleAction = () => {
            if (!this.isPlaying || this.isPaused || this.isGameOver) return;
            this.mario.jump();
        };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                handleAction();
            }
        });
        this.canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleAction();
        }, { passive: false });
        this.canvas.addEventListener('mousedown', handleAction);
    }

    start() {
        this.mario = new Mario();
        this.background = new Background(this.canvas.width, this.canvas.height);
        this.pipes = [];
        this.score = 0;
        this.coins = 0;
        this.gameSpeed = 3.0;
        this.pipeSpawnTimer = 0;
        this.isGameOver = false;
        this.isPaused = false;
        this.isPlaying = true;

        this.updateHUD();
        
        // View switches
        document.getElementById('start-menu').classList.add('hidden');
        document.getElementById('game-over-menu').classList.add('hidden');
        document.getElementById('pause-btn').classList.remove('hidden');

        // Reset pause display element look
        document.getElementById('pause-btn').classList.remove('paused-state');
    }

    togglePause() {
        if (!this.isPlaying || this.isGameOver) return;
        this.isPaused = !this.isPaused;
        const pBtn = document.getElementById('pause-btn');
        if (this.isPaused) {
            pBtn.classList.add('paused-state');
        } else {
            pBtn.classList.remove('paused-state');
        }
    }

    gameOver() {
        this.isGameOver = true;
        this.isPlaying = false;
        Sound.playHit();
        
        if (this.score > this.highScore) {
            this.highScore = this.score;
            localStorage.setItem('flappy_mario_highscore', this.highScore);
        }

        document.getElementById('final-score').innerText = this.score;
        document.getElementById('high-score').innerText = this.highScore;
        document.getElementById('game-over-menu').classList.remove('hidden');
        document.getElementById('pause-btn').classList.add('hidden');
    }

    updateHUD() {
        document.getElementById('hud-score').innerText = this.score;
        document.getElementById('hud-coins').innerText = this.coins;
    }

    incrementDifficulty() {
        // Dynamic procedural scaling based on score threshold
        this.gameSpeed = 3.0 + (this.score * 0.08);
        if (this.gameSpeed > 6.5) this.gameSpeed = 6.5; // Cap absolute terminal horizontal rate
    }

    run() {
        const loop = () => {
            this.update();
            this.render();
            requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
    }

    update() {
        if (!this.isPlaying || this.isPaused || this.isGameOver) return;

        this.background.update(this.gameSpeed * 0.4);
        this.mario.update();

        let hitbox = this.mario.getHitbox();

        // Canvas Boundary Collisions (Sky ceiling & Ground floor)
        if (hitbox.y < 0) {
            this.mario.y = 0;
            this.mario.velocity = 0;
        }
        if (hitbox.y + hitbox.h > this.canvas.height - 80) {
            this.gameOver();
            return;
        }

        // Pipe loop processing
        this.pipeSpawnTimer++;
        // Intermittent adaptive spatial frequency generation mapping
        let spawnInterval = Math.max(80, 140 - Math.floor(this.gameSpeed * 8));
        if (this.pipeSpawnTimer >= spawnInterval) {
            let gapSize = Math.max(125, 170 - (this.score * 1.5)); // Dynamic narrowing gap
            let minH = 50;
            let maxH = this.canvas.height - 80 - gapSize - minH;
            let topHeight = Math.floor(Math.random() * (maxH - minH)) + minH;
            
            this.pipes.push(new Pipe(this.canvas.width, this.canvas.height, gapSize, topHeight));
            this.pipeSpawnTimer = 0;
        }

        for (let i = this.pipes.length - 1; i >= 0; i--) {
            let p = this.pipes[i];
            p.update(this.gameSpeed);

            // Crash detection
            if (p.checkCollision(hitbox)) {
                this.gameOver();
                return;
            }

            // Coin acquisition scanning
            if (p.checkCoinPickup(hitbox)) {
                Sound.playCoin();
                this.coins++;
                this.score += 5; // Bonus score incentive points
                this.updateHUD();
                this.incrementDifficulty();
            }

            // Score traversal point cross valuation checking
            if (!p.passed && p.x + p.width / 2 < this.mario.x) {
                p.passed = true;
                this.score++;
                Sound.playScore(); // Plays point sound immediately upon clear
                this.updateHUD();
                this.incrementDifficulty();
            }

            // Memory collection array clearing
            if (p.x + p.width < 0) {
                this.pipes.splice(i, 1);
            }
        }
    }

    render() {
        // Clear frame buffer
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        // Render Background Layers
        if (this.background) {
            this.background.draw(this.ctx);
        } else {
            this.ctx.fillStyle = '#5c94fc';
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }

        // Render Pipes
        this.pipes.forEach(p => p.draw(this.ctx));

        // Render Ground Layer Texture blocks
        const groundY = this.canvas.height - 80;
        let groundGrad = this.ctx.createLinearGradient(0, groundY, 0, this.canvas.height);
        groundGrad.addColorStop(0, '#d88838');
        groundGrad.addColorStop(0.2, '#fce4a0');
        groundGrad.addColorStop(1, '#b53000');
        
        this.ctx.fillStyle = groundGrad;
        this.ctx.fillRect(0, groundY, this.canvas.width, 80);
        
        this.ctx.strokeStyle = '#000';
        this.ctx.lineWidth = 4;
        this.ctx.beginPath();
        this.ctx.moveTo(0, groundY);
        this.ctx.lineTo(this.canvas.width, groundY);
        this.ctx.stroke();

        // Draw classic underground dirt pattern lines
        this.ctx.strokeStyle = '#9c4a00';
        this.ctx.lineWidth = 3;
        for (let ix = (this.isPlaying ? -(this.pipeSpawnTimer * this.gameSpeed) % 32 : 0); ix < this.canvas.width + 32; ix += 32) {
            this.ctx.beginPath();
            this.ctx.moveTo(ix, groundY + 4);
            this.ctx.lineTo(ix - 12, groundY + 80);
            this.ctx.stroke();
        }

        // Render Mario
        if (this.mario) {
            this.mario.draw(this.ctx);
        }
    }
}

// Instantiate engine setup initialization
const Game = new GameEngine();
Game.run();
</script>
